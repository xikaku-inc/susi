<!DOCTYPE html>

<script>
// Apply theme before paint to avoid a flash of the wrong colour scheme.
(function () {
    const t = localStorage.getItem('susi_theme') || 'system';
    if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
    else if (t === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
        document.documentElement.setAttribute('data-theme', 'light');
    }
})();
</script>

<style>
:root {
    --bg: #0f1115;
    --bg2: #161922;
    --bg3: #1d212c;
    --border: #262b38;
    --text1: #e6e8ec;
    --text2: #9aa0aa;
    --accent: #6aa9ff;
    --accent-soft: rgba(106,169,255,0.15);
    --code-bg: #11141b;
    --radius: 6px;
    --sidebar-width: 240px;
}
:root[data-theme="light"] {
    --bg: #ffffff;
    --bg2: #f5f6f8;
    --bg3: #eceef2;
    --border: #d8dbe1;
    --text1: #1a1d23;
    --text2: #5c6470;
    --accent: #2563eb;
    --accent-soft: rgba(37,99,235,0.10);
    --code-bg: #f1f3f6;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
* { scrollbar-width: thin; scrollbar-color: var(--bg3) var(--bg2); }
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-track { background: var(--bg2); }
*::-webkit-scrollbar-thumb {
    background: var(--bg3);
    border-radius: 5px;
    border: 2px solid var(--bg2);
}
*::-webkit-scrollbar-thumb:hover { background: var(--border); }
*::-webkit-scrollbar-corner { background: var(--bg2); }
body {
    background: var(--bg);
    color: var(--text1);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.55;
    min-height: 100vh;
}
.header {
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 10;
}
.header .brand {
    color: inherit; text-decoration: none;
    font-size: 16px; font-weight: 600; letter-spacing: 0.02em;
}
.header-right { display: flex; gap: 10px; align-items: center; }
.btn {
    padding: 6px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text1);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
}
.btn:hover { background: var(--bg3); }
.btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn.primary:hover { filter: brightness(1.1); }
.btn.danger { color: #e2615e; }

.layout {
    display: grid;
    grid-template-columns: var(--sidebar-width) 1fr 220px;
    min-height: calc(100vh - 56px);
}
.layout.no-sidebar { grid-template-columns: 1fr 220px; }
.layout.no-sidebar .sidebar { display: none; }
.layout.no-toc { grid-template-columns: var(--sidebar-width) 1fr; }
.layout.no-toc .toc-rail { display: none; }
.layout.no-sidebar.no-toc { grid-template-columns: 1fr; }
.sidebar {
    border-right: 1px solid var(--border);
    background: var(--bg2);
    padding: 16px 0;
    overflow-y: auto;
    max-height: calc(100vh - 56px);
    position: sticky;
    top: 56px;
}
.sidebar h3 {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 14px 16px 6px;
}
.sidebar a {
    display: block;
    color: var(--text1);
    text-decoration: none;
    font-size: 13px;
    padding: 5px 16px 5px 24px;
    border-left: 2px solid transparent;
}
.sidebar a:hover { background: var(--bg3); }
.sidebar a.active {
    background: var(--accent-soft);
    border-left-color: var(--accent);
    color: var(--accent);
    font-weight: 500;
}
.sidebar a.section-head {
    padding-left: 16px;
    font-weight: 500;
}
.sidebar .empty { padding: 16px; color: var(--text2); font-size: 13px; }

.content {
    padding: 40px 56px;
    max-width: 880px;
    margin-left: auto;
    margin-right: auto;
    width: 100%;
}
.content h1 { font-size: 30px; margin: 0 0 18px; font-weight: 600; line-height: 1.25; }
.content h2 { font-size: 21px; margin: 32px 0 12px; font-weight: 600; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.content h3 { font-size: 16px; margin: 24px 0 10px; font-weight: 600; }
.content h4 { font-size: 14px; margin: 18px 0 8px; font-weight: 600; color: var(--text2); }
.content p { margin: 10px 0; }
.content code {
    background: var(--code-bg);
    padding: 1px 6px;
    border-radius: 4px;
    font-family: "SF Mono", "Consolas", "Fira Code", monospace;
    font-size: 12.5px;
}
.content pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    overflow-x: auto;
    font-size: 12.5px;
    line-height: 1.5;
    margin: 14px 0;
}
.content pre code { background: transparent; padding: 0; font-size: inherit; }
.content blockquote {
    border-left: 3px solid var(--accent);
    background: var(--accent-soft);
    padding: 8px 14px;

}
.content table { border-collapse: collapse; margin: 14px 0; font-size: 13px; width: 100%; }
.content th, .content td {

}
.content th { background: var(--bg2); font-weight: 600; }

.content table.grid { table-layout: fixed; }
.content table.grid,
.content table.grid th,
.content table.grid td,
.content table.grid tr:nth-child(even) td { background: transparent; border: none; }
.content table.grid th { font-weight: inherit; text-align: left; }
.content table.grid td, .content table.grid th { vertical-align: middle; padding: 14px; }
.content .video-embed { position: relative; padding-top: 56.25%; margin: 16px 0; }
.content .video-embed iframe {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; border: 0;
    border-radius: var(--radius);
}
.content ul, .content ol { margin: 10px 0; padding-left: 24px; }
.content li { margin: 4px 0; }
.content a { color: var(--accent); text-decoration: none; }
.content a:hover { text-decoration: underline; }
.content img { max-width: 100%; border-radius: var(--radius); display: block; margin: 16px auto; }
.content img.no-radius, .EasyMDEContainer .editor-preview img.no-radius,
.EasyMDEContainer .editor-preview-side img.no-radius { border-radius: 0; }

.content h1, .content h2, .content h3, .content h4 { scroll-margin-top: 72px; }

.meta {

.empty-state {

.asset-toolbar {

    color: var(--text1); border-radius: var(--radius); cursor: pointer;

.asset-actions button:hover { background: var(--bg3); }
.asset-actions button.danger { color: #e2615e; border-color: #e2615e; }

/* Right-side table of contents */
.toc-rail {
    border-left: 1px solid var(--border);
    background: var(--bg);
    padding: 24px 18px;

    .sidebar { position: static; max-height: none; border-right: none; border-bottom: 1px solid var(--border); }

<script>
function applyTheme(t) {
    const root = document.documentElement;
    if (t === 'system') {
        root.removeAttribute('data-theme');
        const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
        if (prefersLight) root.setAttribute('data-theme', 'light');
    } else {
        root.setAttribute('data-theme', t);
    }
    const btn = document.getElementById('btnTheme');
    if (btn) {
        btn.textContent = t === 'dark' ? '🌙' : t === 'light' ? '☀️' : '🌓';
        btn.title = 'Theme: ' + t + ' (click to cycle)';
    }
}
function cycleTheme() {
    const cur = localStorage.getItem('susi_theme') || 'system';
    const next = cur === 'dark' ? 'light' : cur === 'light' ? 'system' : 'dark';
    localStorage.setItem('susi_theme', next);
    applyTheme(next);
}
applyTheme(localStorage.getItem('susi_theme') || 'system');
if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
        if ((localStorage.getItem('susi_theme') || 'system') === 'system') applyTheme('system');
    });
}

const API = '/api/v1';
let pages = [];
let assets = [];
let currentSlug = null;
let currentPage = null;
let editMode = false;
let isAdmin = false;

function authToken() { return localStorage.getItem('auth_token') || ''; }
function isPotentialAdmin() { return !!authToken(); }

async function resolveAdminStatus() {
    if (!authToken()) { isAdmin = false; return; }
    try {
        const r = await fetch('/api/v1/auth/status', { headers: { 'Authorization': 'Bearer ' + authToken() }});
        if (r.ok) {
            const d = await r.json();
            isAdmin = (d.role === 'admin');
        } else if (r.status === 401) {
            localStorage.removeItem('auth_token');
            isAdmin = false;
        }
    } catch (e) { isAdmin = false; }
    updateAdminChrome();
}

function updateAdminChrome() {
    document.getElementById('navLogoutBtn').style.display = isAdmin ? '' : 'none';
    document.getElementById('newPageBtn').style.display = isAdmin ? '' : 'none';
    document.getElementById('editBtn').style.display = (isAdmin && currentPage) ? '' : 'none';
}

function logoutFromSite() {
    localStorage.removeItem('auth_token');
    isAdmin = false;
    location.reload();
}

function toast(msg, kind) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast visible' + (kind ? ' ' + kind : '');
    setTimeout(() => el.classList.remove('visible'), 2400);
}

function escHtml(s) {
    return (s || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ---------------------------------------------------------------------------
// Markdown renderer (same as docs.html)
// ---------------------------------------------------------------------------

function videoEmbedSrc(url) {
    let m = url.match(/^https?:\/\/(?:www\.)?vimeo\.com\/(\d+)(?:\/([a-f0-9]+))?/);
    if (m) return 'https://player.vimeo.com/video/' + m[1] + (m[2] ? '?h=' + m[2] : '');
    m = url.match(/^https?:\/\/player\.vimeo\.com\/video\/\d+/);
    if (m) return url;
    m = url.match(/^https?:\/\/(?:www\.)?youtube\.com\/watch\?v=([A-Za-z0-9_-]+)/);
    if (m) return 'https://www.youtube.com/embed/' + m[1];
    m = url.match(/^https?:\/\/youtu\.be\/([A-Za-z0-9_-]+)/);
    if (m) return 'https://www.youtube.com/embed/' + m[1];
    m = url.match(/^https?:\/\/(?:www\.)?youtube\.com\/embed\/[A-Za-z0-9_-]+/);
    if (m) return url;
    return null;
}

function renderInline(s) {
    let out = escHtml(s);
    out = out.replace(/`([^`]+)`/g, (_, c) => '<code>' + c + '</code>');
    out = out.replace(/!\[([^\]]*)\]\(([^)]+)\)(\{[^}]*\})?/g, (_, alt, url, attrs) => {
        const vsrc = videoEmbedSrc(url);
        if (vsrc) {
            return '<div class="video-embed"><iframe src="' + vsrc
                + '" title="' + alt
                + '" allow="autoplay; fullscreen; picture-in-picture"'
                + ' allowfullscreen loading="lazy"></iframe></div>';
        }
        let extra = '';
        if (attrs) {
            const w = attrs.match(/\bwidth\s*=\s*(\d+(?:px|%)?)/i);
            const h = attrs.match(/\bheight\s*=\s*(\d+(?:px|%)?)/i);
            if (w) extra += ' width="' + w[1] + '"';
            if (h) extra += ' height="' + h[1] + '"';
            const classes = [...attrs.matchAll(/\.([A-Za-z][\w-]*)/g)].map(m => m[1]);
            if (classes.length) extra += ' class="' + classes.join(' ') + '"';
        }
        return '<img alt="' + alt + '" src="' + resolveAssetUrl(url) + '"' + extra + '>';
    });
    out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) => {
        const safe = url.startsWith('http') || url.startsWith('#') || url.startsWith('/')
            ? url : '/site/' + url;
        return '<a href="' + safe + '">' + text + '</a>';
    });
    out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    out = out.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
    return out;
}

function resolveAssetUrl(url) {
    if (url.startsWith('http') || url.startsWith('/') || url.startsWith('data:')) return url;
    return API + '/website/assets/' + encodeURIComponent(url);
}

function renderMarkdown(src) {
    if (!src) return '';
    const lines = src.replace(/\r\n/g, '\n').split('\n');
    const out = [];
    let i = 0;
    while (i < lines.length) {
        const line = lines[i];
        const fence = line.match(/^```(.*)$/);
        if (fence) {
            const lang = fence[1].trim();
            const buf = [];
            i++;
            while (i < lines.length && !lines[i].match(/^```\s*$/)) {
                buf.push(lines[i]); i++;
            }
            i++;
            out.push('<pre><code' + (lang ? ' class="lang-' + escHtml(lang) + '"' : '') + '>'
                + escHtml(buf.join('\n')) + '</code></pre>');
            continue;
        }
        const h = line.match(/^(#{1,6})\s+(.*)$/);
        if (h) {
            const level = h[1].length;
            out.push('<h' + level + '>' + renderInline(h[2]) + '</h' + level + '>');
            i++;
            continue;
        }
        if (/^---+\s*$/.test(line)) { out.push('<hr>'); i++; continue; }
        if (line.startsWith('> ')) {
            const buf = [];
            while (i < lines.length && lines[i].startsWith('> ')) {
                buf.push(lines[i].slice(2)); i++;
            }
            out.push('<blockquote>' + renderMarkdown(buf.join('\n')) + '</blockquote>');
            continue;
        }
        if (line.includes('|') && i + 1 < lines.length && /^\s*\|?[\s:|-]+\|[\s:|-]+\|?\s*$/.test(lines[i+1])) {
            const headers = splitTableRow(line);
            i += 2;
            const rows = [];
            while (i < lines.length && lines[i].includes('|') && lines[i].trim() !== '') {
                rows.push(splitTableRow(lines[i])); i++;
            }
            const isGrid = headers.every(h => h.trim() === '');
            let html = isGrid ? '<table class="grid"><tbody>' : '<table><thead><tr>';
            if (!isGrid) {
                headers.forEach(hh => html += '<th>' + renderInline(hh) + '</th>');
                html += '</tr></thead><tbody>';
            }
            rows.forEach(r => {
                html += '<tr>';
                r.forEach(c => html += '<td>' + renderInline(c) + '</td>');
                html += '</tr>';
            });
            html += '</tbody></table>';
            out.push(html);
            continue;
        }
        if (/^[-*]\s+/.test(line)) {
            const buf = [];
            while (i < lines.length && /^[-*]\s+/.test(lines[i])) {
                buf.push(lines[i].replace(/^[-*]\s+/, '')); i++;
            }
            out.push('<ul>' + buf.map(b => '<li>' + renderInline(b) + '</li>').join('') + '</ul>');
            continue;
        }
        const ol = line.match(/^(\d+)\.\s+(.*)$/);
        if (ol) {
            const start = ol[1];
            const buf = [ol[2]];
            i++;
            while (i < lines.length && /^\d+\.\s+/.test(lines[i])) {
                buf.push(lines[i].replace(/^\d+\.\s+/, '')); i++;
            }
            const startAttr = start === '1' ? '' : ' start="' + start + '"';
            out.push('<ol' + startAttr + '>' + buf.map(b => '<li>' + renderInline(b) + '</li>').join('') + '</ol>');
            continue;
        }
        if (line.trim() === '') { i++; continue; }
        const para = [line];
        i++;
        while (i < lines.length && lines[i].trim() !== ''
               && !/^(#{1,6}\s|```|>|---+\s*$|[-*]\s|\d+\.\s)/.test(lines[i])
               && !(lines[i].includes('|') && i + 1 < lines.length && /^\s*\|?[\s:|-]+\|/.test(lines[i+1]))) {
            para.push(lines[i]); i++;
        }
        const joined = para.map((ln, k) =>
            (k < para.length - 1 && /  +$/.test(ln)) ? ln.replace(/\s+$/, '') + '\u0001' : ln
        ).join(' ');
        out.push('<p>' + renderInline(joined).replace(/\u0001/g, '<br>') + '</p>');
    }
    return out.join('\n');
}

function splitTableRow(line) {
    let s = line.trim();
    if (s.startsWith('|')) s = s.slice(1);
    if (s.endsWith('|')) s = s.slice(0, -1);
    const cells = [];
    let cur = '';
    for (let j = 0; j < s.length; j++) {
        if (s[j] === '\\' && j + 1 < s.length && s[j+1] === '|') { cur += '|'; j++; }
        else if (s[j] === '|') { cells.push(cur.trim()); cur = ''; }
        else cur += s[j];
    }
    cells.push(cur.trim());
    return cells;
}

async function loadIndex() {
    const resp = await fetch(API + '/website/pages');
    if (!resp.ok) { return false; }
    const data = await resp.json();
    pages = data.pages || [];
    assets = data.assets || [];
    return true;
}

async function loadPage(slug) {
    currentSlug = slug;
    const resp = await fetch(API + '/website/pages/' + encodeURIComponent(slug));
    if (!resp.ok) {
        currentPage = null;
        renderEmptyState('Page "' + slug + '" not found.');
        return;
    }
    currentPage = await resp.json();
    editMode = false;
    if (easymde) { try { easymde.toTextArea(); } catch (e) {} easymde = null; }
    renderSidebar();
    renderPage();
}

function renderSidebar() {
    const sb = document.getElementById('sidebar');
    const layout = document.getElementById('layout');
    // Hide sidebar entirely if there's only 0 or 1 page (one-pager mode).
    if (pages.length <= 1) {
        sb.innerHTML = '';
        if (layout) layout.classList.add('no-sidebar');
        return;
    }
    if (layout) layout.classList.remove('no-sidebar');
    const byParent = new Map();
    const topLevel = [];
    const slugSet = new Set(pages.map(p => p.slug));
    pages.forEach(p => {
        if (p.parent_slug && slugSet.has(p.parent_slug)) {
            if (!byParent.has(p.parent_slug)) byParent.set(p.parent_slug, []);
            byParent.get(p.parent_slug).push(p);
        } else {
            topLevel.push(p);
        }
    });
    topLevel.sort((a, b) => a.ord - b.ord || a.title.localeCompare(b.title));
    let html = '';
    topLevel.forEach(p => {
        html += renderSidebarItem(p, true);
        const children = byParent.get(p.slug) || [];
        children.sort((a, b) => a.ord - b.ord || a.title.localeCompare(b.title));
        children.forEach(c => html += renderSidebarItem(c, false));
    });
    const orphans = pages.filter(p => p.parent_slug && !slugSet.has(p.parent_slug));
    if (orphans.length) {
        const groups = new Map();
        orphans.forEach(o => {
            if (!groups.has(o.parent_slug)) groups.set(o.parent_slug, []);
            groups.get(o.parent_slug).push(o);
        });
        for (const [g, items] of groups) {
            html += '<h3>' + escHtml(g) + '</h3>';
            items.sort((a, b) => a.ord - b.ord || a.title.localeCompare(b.title));
            items.forEach(it => html += renderSidebarItem(it, false));
        }
    }
    sb.innerHTML = html;
}

function renderSidebarItem(p, isHead) {
    const cls = (p.slug === currentSlug ? 'active' : '') + (isHead ? ' section-head' : '');
    return '<a class="' + cls + '" href="/site/' + encodeURIComponent(p.slug) + '">'
        + escHtml(p.title) + '</a>';
}

function renderEmptyState(msg) {
    const layout = document.getElementById('layout');
    if (layout) { layout.classList.add('no-toc'); layout.classList.add('no-sidebar'); }
    document.getElementById('content').innerHTML =
        '<div class="empty-state"><h2>' + escHtml(msg) + '</h2></div>';
    document.getElementById('editBtn').style.display = 'none';
}

function renderNoPages() {
    const layout = document.getElementById('layout');
    if (layout) { layout.classList.add('no-toc'); layout.classList.add('no-sidebar'); }
    const c = document.getElementById('content');
    if (isAdmin) {
        c.innerHTML =
            '<div class="empty-state">' +
                '<h2>No pages yet</h2>' +
                '<p>Create the first page to get started.</p>' +
                '<p style="margin-top:20px;"><button class="btn primary" onclick="newPage()">+ New page</button></p>' +
            '</div>';
    } else {
        c.innerHTML = '<div class="empty-state"><h2>Coming soon</h2></div>';
    }
}

function renderPage() {
    const c = document.getElementById('content');
    const layout = document.getElementById('layout');
    if (!currentPage) {
        renderEmptyState('Select a page.');
        return;
    }
    updateAdminChrome();
    if (editMode) {
        if (layout) layout.classList.add('no-toc');
        renderEditor();
        return;
    }
    const meta = currentPage.updated_at
        ? '<div class="meta">Updated ' + escHtml(formatDate(currentPage.updated_at)) + '</div>'
        : '';
    let html = meta + renderMarkdown(currentPage.body_md || '');
    const { html: withIds, headings } = injectHeadingIds(html);
    c.innerHTML = withIds;
    renderToc(headings);
}

function injectHeadingIds(html) {
    const used = new Map();
    const headings = [];
    function slugify(text) {
        const base = text.toLowerCase()
            .replace(/<[^>]+>/g, '')
            .replace(/&[a-z]+;/g, ' ')
            .replace(/[^\p{L}\p{N}]+/gu, '-')
            .replace(/^-+|-+$/g, '')
            || 'section';
        const n = used.get(base) || 0;
        used.set(base, n + 1);
        return n === 0 ? base : base + '-' + n;
    }
    const out = html.replace(/<h([1-4])(?![^>]*\bid=)([^>]*)>([\s\S]*?)<\/h\1>/g,
        (_m, lvl, attrs, inner) => {
            const level = parseInt(lvl, 10);
            const text = inner.replace(/<[^>]+>/g, '').trim();
            if (!text) return _m;
            const id = slugify(text);
            headings.push({ level, text, id });
            return '<h' + lvl + attrs + ' id="' + id + '">' + inner + '</h' + lvl + '>';
        });
    return { html: out, headings };
}

let tocActiveObserver = null;

function renderToc(headings) {
    const rail = document.getElementById('tocRail');
    const layout = document.getElementById('layout');
    if (!rail) return;
    if (tocActiveObserver) { tocActiveObserver.disconnect(); tocActiveObserver = null; }

    let items = headings.slice();
    if (items.length && items[0].level === 1 && currentPage
        && items[0].text.toLowerCase() === (currentPage.title || '').toLowerCase()) {
        items = items.slice(1);
    }
    if (items.length < 2) {
        rail.innerHTML = '';
        if (layout) layout.classList.add('no-toc');
        return;
    }
    if (layout) layout.classList.remove('no-toc');

    const links = items.map(h => {
        const cls = 'lvl-' + h.level;
        return '<a class="' + cls + '" href="#' + h.id + '" data-toc-id="' + h.id + '">' + escHtml(h.text) + '</a>';
    }).join('');
    rail.innerHTML = '<div class="toc-title">On this page</div>' + links;

    rail.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', (e) => {
            e.preventDefault();
            const id = a.getAttribute('data-toc-id');
            const el = document.getElementById(id);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
    });

    const observed = items.map(h => document.getElementById(h.id)).filter(Boolean);
    const linkById = new Map();
    rail.querySelectorAll('a').forEach(a => linkById.set(a.getAttribute('data-toc-id'), a));
    const setActive = (id) => {
        rail.querySelectorAll('a.active').forEach(a => a.classList.remove('active'));
        const a = linkById.get(id);
        if (a) a.classList.add('active');
    };
    tocActiveObserver = new IntersectionObserver((entries) => {
        const visible = entries
            .filter(e => e.isIntersecting)
            .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
        if (visible.length) setActive(visible[0].target.id);
    }, { rootMargin: '-72px 0px -60% 0px', threshold: 0 });
    observed.forEach(el => tocActiveObserver.observe(el));
    if (observed[0]) setActive(observed[0].id);
}

    const c = document.getElementById('content');

            '<label>Order</label><input id="editOrd" type="number" style="width:80px;">' +
        '</div>' +
        '<div class="edit-meta-row" style="margin-top:8px;">' +
            '<label title="Overrides the auto-derived description for SEO / AI crawlers. Leave empty to auto-derive from body.">SEO description</label>' +
            '<input id="editMetaDesc" type="text" maxlength="300" '
                + 'placeholder="Shown as meta description and in AI/search snippets — keep under ~160 chars. Blank = auto-derive." '
                + 'style="flex:1;min-width:200px;">' +
        '</div>' +
        '<textarea id="editBody"></textarea>' +
        '<div class="edit-actions">' +

            '<button class="btn" onclick="cancelEdit()">Cancel</button>' +

            '<button class="btn" onclick="openAssets()" title="Image & asset library">Assets</button>' +

            '<button class="btn danger" onclick="deletePage()">Delete page</button>' +
        '</div>';
    document.getElementById('editTitle').value = title;
    document.getElementById('editSlug').value = currentSlug;
    document.getElementById('editOrd').value = ord;
    document.getElementById('editMetaDesc').value = metaDesc;
    initEasyMDE(body);
}

function buildParentOptions(selected, excludeSlug) {
    const opts = ['<option value="">(none — top level)</option>'];
    const sorted = [...pages].sort((a, b) => a.title.localeCompare(b.title));
    const known = new Set();
    sorted.forEach(p => {
        if (p.slug === excludeSlug) return;
        known.add(p.slug);
        const sel = p.slug === selected ? ' selected' : '';
        opts.push('<option value="' + escHtml(p.slug) + '"' + sel + '>'
            + escHtml(p.title) + ' (' + escHtml(p.slug) + ')</option>');
    });
    if (selected && !known.has(selected)) {
        opts.push('<option value="' + escHtml(selected) + '" selected>'
            + escHtml(selected) + ' (orphan)</option>');
    }
    return opts.join('');
}

function initEasyMDE(initialBody) {
    if (typeof EasyMDE === 'undefined') {
        toast('Editor failed to load — refresh the page', 'error');
        return;
    }
    if (easymde) { try { easymde.toTextArea(); } catch (e) {} easymde = null; }

    easymde = new EasyMDE({
        element: document.getElementById('editBody'),
        initialValue: initialBody,
        autofocus: true,
        spellChecker: false,
        autoDownloadFontAwesome: false,
        status: ['lines', 'words'],
        uploadImage: true,
        imageUploadFunction: easymdeImageUpload,
        imageMaxSize: 100 * 1024 * 1024,
        imageAccept: 'image/*',
        imageTexts: {
            sbInit: 'Attach images by drag-and-drop, paste, or the upload button.',
            sbOnDrop: 'Uploading #images_names#…',
            sbProgress: 'Uploading #file_name#: #progress#%',
            sbOnUploaded: 'Uploaded #image_name#',
            sizeUnits: ' B, KB, MB',
        },
        previewRender: (txt) => renderMarkdown(txt),
        renderingConfig: { singleLineBreaks: false, codeSyntaxHighlighting: false },
        toolbar: [
            { name: 'bold', action: EasyMDE.toggleBold, text: 'B', title: 'Bold' },
            { name: 'italic', action: EasyMDE.toggleItalic, text: 'I', title: 'Italic' },
            { name: 'heading', action: EasyMDE.toggleHeadingSmaller, text: 'H', title: 'Heading' },
            '|',
            { name: 'quote', action: EasyMDE.toggleBlockquote, text: '❝', title: 'Quote' },
            { name: 'code', action: EasyMDE.toggleCodeBlock, text: '</>', title: 'Code block' },
            { name: 'unordered-list', action: EasyMDE.toggleUnorderedList, text: '•', title: 'Bulleted list' },
            { name: 'ordered-list', action: EasyMDE.toggleOrderedList, text: '1.', title: 'Numbered list' },
            { name: 'table', action: EasyMDE.drawTable, text: '⊞', title: 'Insert table' },
            '|',
            { name: 'link', action: EasyMDE.drawLink, text: '🔗', title: 'Insert link' },
            { name: 'upload-image', action: '*image-upload*', text: '🖼', title: 'Upload image' },
            { name: 'horizontal-rule', action: EasyMDE.drawHorizontalRule, text: '—', title: 'Horizontal rule' },
            '|',
            { name: 'preview', action: EasyMDE.togglePreview, text: '👁', title: 'Toggle preview', noDisable: true },
        ],
    });
}

async function easymdeImageUpload(file, onSuccess, onError) {
    if (!isPotentialAdmin()) { onError('Login required'); return; }
    const name = generateAssetName(file);
    try {
        const fd = new FormData();
        fd.append('file', file, name);
        const resp = await fetch(API + '/website/assets', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + authToken() },
            body: fd,
        });
        if (resp.status === 401) {
            onError('Session expired');
            handleSessionExpired(easymde ? easymde.value() : '');
            return;
        }
        if (!resp.ok) {
            const d = await resp.json().catch(() => ({}));
            onError(d.error || ('HTTP ' + resp.status));
            return;
        }
        const data = await resp.json();
        onSuccess(data.name);
        toast('Uploaded ' + data.name, 'success');
    } catch (e) {
        onError(e.message);
    }
}

function inferExtension(file) {
    const m = (file.type || '').match(/^image\/(\w+)/);
    if (!m) return 'png';
    const ext = m[1].toLowerCase();
    return ext === 'jpeg' ? 'jpg' : ext;
}

function generateAssetName(file) {
    const orig = (file.name || '').replace(/[^A-Za-z0-9._-]/g, '_');
    // Browsers use a generic "image.png" filename for clipboard-pasted
    // images, which collides across pages — always timestamp those.
    const isPasteDefault = /^image\.(png|jpe?g|gif|webp|svg)$/i.test(orig);
    if (orig && !isPasteDefault && /\.[A-Za-z0-9]+$/.test(orig)) return orig;
    const ts = new Date().toISOString().replace(/[:.]/g, '-').replace(/Z$/, '');
    return 'image-' + ts + '.' + inferExtension(file);
}

function formatDate(s) {
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d.getTime())) return s;
    return d.toLocaleString();
}

function enterEditMode() {
    if (!currentPage) return;
    if (!isPotentialAdmin()) { toast('Login required', 'error'); return; }
    editMode = true;
    renderPage();
}

function cancelEdit() {
    if (easymde) { try { easymde.toTextArea(); } catch (e) {} easymde = null; }
    editMode = false;
    renderPage();
}

async function savePage() {
    const title = document.getElementById('editTitle').value.trim();
    const parent = document.getElementById('editParent').value.trim();
    const ord = parseInt(document.getElementById('editOrd').value, 10) || 0;
    const body_md = easymde ? easymde.value() : document.getElementById('editBody').value;
    const metaDescEl = document.getElementById('editMetaDesc');
    const meta_description = metaDescEl ? metaDescEl.value.trim() : '';
    const newSlug = document.getElementById('editSlug').value.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '-');
    if (!title) { toast('Title is required', 'error'); return; }
    if (!newSlug) { toast('Slug is required', 'error'); return; }

    let targetSlug = currentSlug;
    if (newSlug !== currentSlug) {
        const renameResp = await fetch(API + '/website/pages/' + encodeURIComponent(currentSlug) + '/rename', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken() },
            body: JSON.stringify({ new_slug: newSlug }),
        });
        if (renameResp.status === 401) { handleSessionExpired(body_md); return; }
        if (!renameResp.ok) {
            const d = await renameResp.json().catch(() => ({}));
            toast('Rename failed: ' + (d.error || renameResp.status), 'error');
            return;
        }
        targetSlug = newSlug;
    }

    const resp = await fetch(API + '/website/pages/' + encodeURIComponent(targetSlug), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken() },
        body: JSON.stringify({ title, body_md, parent_slug: parent || null, ord, meta_description }),
    });
    if (resp.status === 401) { handleSessionExpired(body_md); return; }
    if (!resp.ok) {
        const d = await resp.json().catch(() => ({}));
        toast('Save failed: ' + (d.error || resp.status), 'error');
        return;
    }
    toast('Saved', 'success');
    editMode = false;
    await loadIndex();
    if (targetSlug !== currentSlug) {
        navigateTo(targetSlug);
    } else {
        await loadPage(currentSlug);
    }
}

function handleSessionExpired(currentBody) {
    localStorage.removeItem('auth_token');
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:200;';
    overlay.innerHTML =
        '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:480px;color:var(--text1);">' +
            '<h2 style="margin:0 0 8px;font-size:16px;">Session expired</h2>' +
            '<p style="margin:0 0 14px;color:var(--text2);font-size:13px;">' +
                'Your login token is no longer valid. Copy your edits to the clipboard before logging in again so you don\'t lose them.' +
            '</p>' +
            '<div style="display:flex;gap:8px;justify-content:flex-end;">' +
                '<button class="btn" id="copyEdits">Copy edits to clipboard</button>' +
                '<button class="btn primary" id="reloginBtn">Log in again</button>' +
            '</div>' +
        '</div>';
    document.body.appendChild(overlay);
    overlay.querySelector('#copyEdits').onclick = async () => {
        try {
            await navigator.clipboard.writeText(currentBody || '');
            toast('Copied to clipboard', 'success');
        } catch (e) {
            toast('Copy failed — select-all and copy manually', 'error');
        }
    };
    overlay.querySelector('#reloginBtn').onclick = () => {
        window.open('/', '_blank');
        overlay.remove();
        toast('Log in, then come back to this tab and click Save again.', 'success');
    };
}

async function deletePage() {
    if (!confirm('Delete page "' + currentPage.title + '"? This cannot be undone.')) return;
    const resp = await fetch(API + '/website/pages/' + encodeURIComponent(currentSlug), {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + authToken() },
    });
    if (!resp.ok) { toast('Delete failed', 'error'); return; }
    toast('Deleted', 'success');
    currentSlug = null; currentPage = null;
    await loadIndex();
    navigateTo(null);
}

async function newPage() {
    if (!isPotentialAdmin()) { toast('Login required', 'error'); return; }
    const slug = prompt('New page slug (lowercase, no spaces):');
    if (!slug) return;
    const cleanSlug = slug.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '-');
    if (!cleanSlug) { toast('Invalid slug', 'error'); return; }
    const title = prompt('Page title:', cleanSlug) || cleanSlug;
    const resp = await fetch(API + '/website/pages/' + encodeURIComponent(cleanSlug), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken() },
        body: JSON.stringify({ title, body_md: '# ' + title + '\n\n', parent_slug: null, ord: 999 }),
    });
    if (!resp.ok) { toast('Create failed', 'error'); return; }
    await loadIndex();
    navigateTo(cleanSlug);
}

// ---------------------------------------------------------------------------
// Routing
// ---------------------------------------------------------------------------

// Path-based routing with legacy hash backcompat. Canonical URLs are
// /site/{slug}; if a visitor lands on /site#/foo we transparently upgrade to
// /site/foo via replaceState so crawlers and shared links resolve cleanly.
function slugFromLocation() {
    const path = location.pathname || '';
    const m = path.match(/^\/site\/([^\/\?#]+)/);
    if (m) return decodeURIComponent(m[1]);
    const hash = location.hash.replace(/^#\/?/, '');
    return decodeURIComponent(hash.split('/').filter(Boolean)[0] || '');
}

function navigateTo(slug) {
    const target = slug ? '/site/' + encodeURIComponent(slug) : '/site';
    if (location.pathname + location.search !== target) {
        history.pushState({}, '', target);
    }
    if (location.hash) {
        history.replaceState({}, '', target);
    }
    route();
}

async function route() {
    const slug = slugFromLocation();
    // Upgrade legacy hash URLs (#/foo) to the canonical path form so bookmarks
    // and share-links come out as /site/foo. Crawlers don't follow fragments
    // but users still get a clean URL in the address bar.
    if (location.hash) {
        const clean = slug ? '/site/' + encodeURIComponent(slug) : '/site';
        history.replaceState({}, '', clean + location.search);
    }
    await loadIndex();
    if (pages.length === 0) { renderNoPages(); return; }
    if (slug) {
        await loadPage(slug);
    } else {
        // Default: first top-level page by ord
        const sorted = [...pages].sort((a, b) => a.ord - b.ord || a.title.localeCompare(b.title));
        const first = sorted.find(p => !p.parent_slug) || sorted[0];
        history.replaceState({}, '', '/site/' + encodeURIComponent(first.slug));
        await loadPage(first.slug);
    }
}

window.addEventListener('popstate', route);
window.addEventListener('hashchange', route);

// Intercept intra-site link clicks for SPA navigation.
// Lets Ctrl/Cmd/middle-click still open in a new tab (server renders them fine).
document.addEventListener('click', (e) => {
    const a = e.target.closest && e.target.closest('a[href^="/site/"]');
    if (!a) return;
    if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
    const href = a.getAttribute('href');
    const m = href.match(/^\/site\/([^\/\?#]+)/);
    if (!m) return;
    e.preventDefault();
    navigateTo(decodeURIComponent(m[1]));
});

// ---------------------------------------------------------------------------
// History modal
// ---------------------------------------------------------------------------

let historyState = { slug: null, revisions: [], selectedId: null };

async function openHistory() {
    if (!currentSlug) { toast('Save the page first to see history', 'error'); return; }
    historyState = { slug: currentSlug, revisions: [], selectedId: null };
    document.getElementById('historyModal').classList.add('visible');
    renderHistory('<div class="empty-state">Loading revisions…</div>');
    try {
        const resp = await fetch(API + '/website/pages/' + encodeURIComponent(currentSlug) + '/revisions', {
            headers: { 'Authorization': 'Bearer ' + authToken() },
        });
        if (!resp.ok) { renderHistory('<div class="empty-state">Failed to load revisions.</div>'); return; }
        const data = await resp.json();
        historyState.revisions = data.revisions || [];
        renderHistoryList();
    } catch (e) {
        renderHistory('<div class="empty-state">' + escHtml(e.message) + '</div>');
    }
}

function closeHistory() { document.getElementById('historyModal').classList.remove('visible'); }

function renderHistory(html) { document.getElementById('historyBody').innerHTML = html; }

function renderHistoryList() {
    const revs = historyState.revisions;
    if (!revs.length) {
        renderHistory('<div class="empty-state">No revisions yet. This page has been saved only once — history is captured from the next save onward.</div>');
        return;
    }
    const items = revs.map(r => {
        const when = formatDate(r.captured_at);
        const author = r.author || '—';
        const size = r.body_length + ' chars';
        const sel = r.id === historyState.selectedId ? ' selected' : '';
        return '<div class="rev-item' + sel + '" onclick="selectRevision(' + r.id + ')">'
            + '<div class="rev-when">' + escHtml(when) + '</div>'
            + '<div class="rev-author">' + escHtml(author) + '</div>'
            + '<div class="rev-title">' + escHtml(r.title) + '</div>'
            + '<div class="rev-size">' + size + '</div>'
            + '</div>';
    }).join('');
    const preview = '<div id="revPreview"></div>';
    renderHistory('<div class="rev-list">' + items + '</div>' + preview);
    if (historyState.selectedId) showRevisionPreview(historyState.selectedId);
}

async function selectRevision(id) {
    historyState.selectedId = id;
    // Update selection class without re-rendering the whole list.
    document.querySelectorAll('.rev-item').forEach(el => el.classList.remove('selected'));
    const target = [...document.querySelectorAll('.rev-item')].find(
        el => el.getAttribute('onclick') === 'selectRevision(' + id + ')'
    );
    if (target) target.classList.add('selected');
    await showRevisionPreview(id);
}

async function showRevisionPreview(id) {
    const box = document.getElementById('revPreview');
    if (!box) return;
    box.innerHTML = '<div class="empty-state">Loading…</div>';
    try {
        const resp = await fetch(
            API + '/website/pages/' + encodeURIComponent(historyState.slug)
                + '/revisions/' + id,
            { headers: { 'Authorization': 'Bearer ' + authToken() } },
        );
        if (!resp.ok) { box.innerHTML = '<div class="empty-state">Failed to load.</div>'; return; }
        const data = await resp.json();
        const body = data.body_md || '';
        const snippet = body.length > 4000 ? body.slice(0, 4000) + '\n…[truncated]' : body;
        box.innerHTML = '<div style="display:flex;gap:8px;margin-bottom:10px;align-items:center;">'
            + '<strong>' + escHtml(data.title || '') + '</strong>'
            + '<span style="color:var(--text2);font-size:12px;">' + escHtml(formatDate(data.captured_at || '')) + '</span>'
            + '<div style="flex:1"></div>'
            + '<button class="btn primary" onclick="restoreRevision(' + id + ')">Restore this revision</button>'
            + '</div>'
            + '<div class="rev-preview">' + escHtml(snippet) + '</div>';
    } catch (e) {
        box.innerHTML = '<div class="empty-state">' + escHtml(e.message) + '</div>';
    }
}

async function restoreRevision(id) {
    if (!confirm('Restore this revision? Your current editor content will be overwritten, and the current saved state will be captured as a new revision.')) return;
    try {
        const resp = await fetch(
            API + '/website/pages/' + encodeURIComponent(historyState.slug)
                + '/revisions/' + id + '/restore',
            { method: 'POST', headers: { 'Authorization': 'Bearer ' + authToken() } },
        );
        if (!resp.ok) {
            const d = await resp.json().catch(() => ({}));
            toast(d.error || ('HTTP ' + resp.status), 'error');
            return;
        }
        toast('Revision restored — reloading page', 'success');
        closeHistory();
        // Reload the page content so the editor picks up the restored body.
        cancelEdit();
        await route();
    } catch (e) {
        toast(e.message, 'error');
    }
}

// ---------------------------------------------------------------------------
// Assets modal
// ---------------------------------------------------------------------------

let assetsState = { all: [], filter: '', orphansOnly: false };

async function openAssets() {
    document.getElementById('assetsModal').classList.add('visible');
    document.getElementById('assetsBody').innerHTML = '<div class="empty-state">Loading assets…</div>';
    try {
        const resp = await fetch(API + '/website/admin/assets', {
            headers: { 'Authorization': 'Bearer ' + authToken() },
        });
        if (!resp.ok) {
            document.getElementById('assetsBody').innerHTML = '<div class="empty-state">Failed to load assets.</div>';
            return;
        }
        const data = await resp.json();
        assetsState.all = data.assets || [];
        renderAssets();
    } catch (e) {
        document.getElementById('assetsBody').innerHTML = '<div class="empty-state">' + escHtml(e.message) + '</div>';
    }
}

function closeAssets() { document.getElementById('assetsModal').classList.remove('visible'); }

function renderAssets() {
    const q = assetsState.filter.toLowerCase();
    const orphansOnly = assetsState.orphansOnly;
    const filtered = assetsState.all.filter(a => {
        if (orphansOnly && a.usage_count > 0) return false;
        if (q && !a.name.toLowerCase().includes(q)) return false;
        return true;
    });
    const assetCount = assetsState.all.length;
    const orphanCount = assetsState.all.filter(a => a.usage_count === 0).length;
    const bar =
        '<div class="asset-toolbar">'
            + '<input type="search" id="assetFilter" placeholder="Filter by name…" value="' + escHtml(assetsState.filter) + '">'
            + '<label><input type="checkbox" id="assetOrphans" ' + (orphansOnly ? 'checked' : '') + '> Orphans only (' + orphanCount + ')</label>'
            + '<span style="color:var(--text2);font-size:12px;">'
                + filtered.length + ' of ' + assetCount + ' shown'
            + '</span>'
        + '</div>';
    if (!filtered.length) {
        document.getElementById('assetsBody').innerHTML = bar + '<div class="empty-state">No assets match the current filter.</div>';
        wireAssetFilters();
        return;
    }
    const tiles = filtered.map(a => {
        const url = API + '/website/assets/' + encodeURIComponent(a.name);
        const kb = (a.size / 1024).toFixed(0) + ' KB';
        const orphan = a.usage_count === 0;
        const pill = orphan
            ? '<span class="asset-usage-pill orphan">orphan</span>'
            : '<span class="asset-usage-pill" title="' + escHtml((a.pages || []).join(', ')) + '">used on ' + a.usage_count + '</span>';
        return '<div class="asset-tile' + (orphan ? ' orphan' : '') + '">'
            + '<div class="asset-thumb"><img src="' + url + '" alt="' + escHtml(a.name) + '" loading="lazy"></div>'
            + '<div class="asset-meta">'
                + '<div class="asset-name">' + escHtml(a.name) + '</div>'
                + '<div class="asset-info">' + pill + '<span>' + kb + '</span></div>'
            + '</div>'
            + '<div class="asset-actions">'
                + '<button onclick="copyAssetMd(\'' + encodeAttr(a.name) + '\')" title="Copy markdown">Copy MD</button>'
                + '<button onclick="renameAsset(\'' + encodeAttr(a.name) + '\')" title="Rename (rewrites page refs)">Rename</button>'
                + '<button class="danger" onclick="deleteAsset(\'' + encodeAttr(a.name) + '\',' + a.usage_count + ')" title="Delete file">Delete</button>'
            + '</div>'
        + '</div>';
    }).join('');
    document.getElementById('assetsBody').innerHTML = bar + '<div class="asset-grid">' + tiles + '</div>';
    wireAssetFilters();
}

function wireAssetFilters() {
    const f = document.getElementById('assetFilter');
    if (f) f.oninput = (e) => { assetsState.filter = e.target.value; renderAssets(); f.focus(); f.setSelectionRange(f.value.length, f.value.length); };
    const o = document.getElementById('assetOrphans');
    if (o) o.onchange = (e) => { assetsState.orphansOnly = e.target.checked; renderAssets(); };
}

function encodeAttr(s) { return (s || '').replace(/'/g, "\\'"); }

function copyAssetMd(name) {
    const md = '![](' + name + '){width=100%}';
    navigator.clipboard.writeText(md).then(
        () => toast('Copied: ' + md, 'success'),
        (e) => toast('Clipboard denied: ' + e.message, 'error'),
    );
}

async function renameAsset(oldName) {
    const next = prompt('New filename (keep the extension):', oldName);
    if (!next || next === oldName) return;
    try {
        const resp = await fetch(API + '/website/assets/' + encodeURIComponent(oldName) + '/rename', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + authToken(),
            },
            body: JSON.stringify({ new_name: next }),
        });
        const d = await resp.json().catch(() => ({}));
        if (!resp.ok) { toast(d.error || ('HTTP ' + resp.status), 'error'); return; }
        toast('Renamed — rewrote ' + (d.pages_updated || 0) + ' page(s)', 'success');
        await openAssets(); // refresh
    } catch (e) { toast(e.message, 'error'); }
}

async function deleteAsset(name, usageCount) {
    const msg = usageCount > 0
        ? 'This asset is referenced by ' + usageCount + ' page(s). Deleting will break those images. Continue?'
        : 'Delete ' + name + '?';
    if (!confirm(msg)) return;
    try {
        const resp = await fetch(API + '/website/assets/' + encodeURIComponent(name), {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + authToken() },
        });
        if (!resp.ok) {
            const d = await resp.json().catch(() => ({}));
            toast(d.error || ('HTTP ' + resp.status), 'error');
            return;
        }
        toast('Deleted ' + name, 'success');
        assetsState.all = assetsState.all.filter(a => a.name !== name);
        renderAssets();
    } catch (e) { toast(e.message, 'error'); }
}

(async () => {
    await resolveAdminStatus();
    await route();
})();
</script>

    <div class="admin-modal-inner">
        <div class="admin-modal-head">
            <h3>Page history</h3>
            <button class="btn" onclick="closeHistory()">Close</button>
        </div>
        <div id="historyBody" class="admin-modal-body"></div>
    </div>
</div>

<div id="assetsModal" class="admin-modal">
    <div class="admin-modal-inner">
        <div class="admin-modal-head">
            <h3>Asset library</h3>
            <button class="btn" onclick="closeAssets()">Close</button>
        </div>
        <div id="assetsBody" class="admin-modal-body"></div>
    </div>
</div>
