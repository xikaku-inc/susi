services:
  susi-server:
    build: .
    container_name: susi-server
    restart: unless-stopped
    # Bind to loopback only — port is reachable from the on-host nginx
    # reverse proxy but never directly from the public internet.
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      - SUSI_ADMIN_KEY=${SUSI_ADMIN_KEY:?Set SUSI_ADMIN_KEY in .env}
      - RUST_LOG=info
      # Magic-link login (leave SUSI_SMTP_HOST empty to disable)
      - SUSI_SMTP_HOST=${SUSI_SMTP_HOST:-}
      - SUSI_SMTP_PORT=${SUSI_SMTP_PORT:-587}
      - SUSI_SMTP_USER=${SUSI_SMTP_USER:-}
      - SUSI_SMTP_PASSWORD=${SUSI_SMTP_PASSWORD:-}
      - SUSI_SMTP_FROM_NAME=${SUSI_SMTP_FROM_NAME:-Susi}
      - SUSI_SMTP_FROM_ADDR=${SUSI_SMTP_FROM_ADDR:-}
      - SUSI_MAGIC_LINK_BASE_URL=${SUSI_MAGIC_LINK_BASE_URL:-}
    volumes:
      - susi-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  susi-data:
    name: susi-data
